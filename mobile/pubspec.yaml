name: nasoma
description: "Mimi, Nasoma. — App EdTech qui aide les élèves africains à corriger leurs lacunes scolaires."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.0
  flutter: ">=3.22.0"

# ⚠️ Sprint Mobile 1 — version Flutter Web compatible
# Packages mobile-only (camera, ml_kit, sms_autofill, firebase_*, drift, flutter_tts)
# seront réactivés en Sprint Mobile 2 (cible Android avec émulateur).
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ─── State management & navigation ───
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7

  # ─── HTTP backend ───
  dio: ^5.7.0
  dio_smart_retry: ^7.0.1

  # ─── Stockage local (web-friendly via shared_preferences) ───
  shared_preferences: ^2.3.2

  # ─── Image picker + compression ───
  image_picker: ^1.1.2
  flutter_image_compress: ^2.2.0

  # ─── ML Kit OCR on-device (Android) ───
  google_mlkit_text_recognition: ^0.13.0

  # ─── i18n ───
  intl: ^0.20.2

  # ─── UI ───
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0

  # ─── Utils ───
  collection: ^1.18.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: false

  assets:
    - assets/i18n/
