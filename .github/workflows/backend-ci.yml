name: Backend CI

on:
  push:
    branches: [main, develop]
    paths: ["backend/**", ".github/workflows/backend-ci.yml"]
  pull_request:
    paths: ["backend/**", ".github/workflows/backend-ci.yml"]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: nasoma_test
          POSTGRES_USER: nasoma
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nasoma"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (Ruff)
        run: ruff check .

      - name: Format check (Ruff)
        run: ruff format --check .

      - name: Type check (mypy)
        run: mypy app
        continue-on-error: true   # warnings only au démarrage

      - name: Run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://nasoma:testpass@localhost:5432/nasoma_test
        run: alembic upgrade head

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://nasoma:testpass@localhost:5432/nasoma_test
          APP_ENV: dev
        run: pytest --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          flags: backend
        if: always()
